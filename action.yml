name: AutoCoder
description: >
  Automates the process of generating code from GitHub issues using OpenAI ChatGPT
  and subsequently creates a pull request with the generated code for review.
author: autocoder-bot

inputs:
  GITHUB_TOKEN:
    description: Personal access token used for GitHub API authentication.
    required: true
  REPOSITORY:
    description: The repository where the action will be executed.
    required: true
  ISSUE_NUMBER:
    description: The number of the issue that triggered the action.
    required: true
  OPENAI_API_KEY:
    description: API key for OpenAI to generate code based on issue descriptions.
    required: true
  SCRIPT_PATH:
    description: The path to the script that interacts with ChatGPT and generates code.
    required: true
  LABEL:
    description: The label that triggers the action.
    required: true
    default: autocoder-bot

runs:
  using: composite
  steps:
    - name: checkout__the_repository
      uses: actions/checkout@v4

    - name: make_the_script_executable
      run: chmod +x ${{ inputs.SCRIPT_PATH }}
      shell: bash

    - name: run_the_script
      run: bash ${{ inputs.SCRIPT_PATH }} ${{ inputs.GITHUB_TOKEN }} ${{ inputs.REPOSITORY }} ${{ inputs.ISSUE_NUMBER }} ${{ inputs.OPENAI_API_KEY }}
      shell: bash

    - name: configure_credentials_or_commit_files
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "autocoder-bot"
        git add .
        git commit -m "Add generated code for issue #${{ inputs.ISSUE_NUMBER }}" || echo "Nothing to commit"
      shell: bash

    - name: create_pull_request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ inputs.GITHUB_TOKEN }}
        branch: autocoder-branch-${{ inputs.ISSUE_NUMBER }}
        base: main
        title: "Generated code for issue #${{ inputs.ISSUE_NUMBER }}"
        labels: autocoder-bot
